# This workflow publishes tested cross-platform oz binaries for version tags.
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build local CLIs
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/oz-bin"
          mkdir -p "$install_dir"
          go build -o "$install_dir/oz" ./cmd/oz
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/oz" --version

      - name: Run Go tests
        run: go test ./...

  build:
    name: Build oz ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: true
      matrix:
        include:
          - tool: oz
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - tool: oz
            goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - tool: oz
            goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - tool: oz
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz
          - tool: oz
            goos: windows
            goarch: amd64
            archive_ext: zip
          - tool: oz
            goos: windows
            goarch: arm64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p build
          output="build/oz"
          if [ "${GOOS}" = "windows" ]; then
            output="build/oz.exe"
          fi
          version="v0.0.0-dev"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          fi
          go build -trimpath -ldflags="-s -w -X github.com/xbugs221/oz/internal/ozcli.version=${version}" -o "${output}" ./cmd/oz

      - name: Package Unix binary
        if: matrix.goos != 'windows'
        env:
        run: |
          set -euo pipefail
          archive="oz_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C build -czf "${archive}" oz

      - name: Package Windows binary
        if: matrix.goos == 'windows'
        env:
        run: |
          set -euo pipefail
          archive="oz_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          (cd build && zip "../${archive}" oz.exe)

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: oz-${{ matrix.goos }}-${{ matrix.goarch }}
          path: oz_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > sha256sums.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes ""
          fi
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
