max_review_iterations: 5
stages:
  planning:
    agent: codex
    reasoning: xhigh
  execution:
    agent: codex
    reasoning: medium
  fix:
    agent: codex
    reasoning: medium
  review:
    agent: codex
    reasoning: high
  qa:
    agent: codex
    reasoning: high
  archive:
    agent: codex
    reasoning: low
validation:
  limit: 3
  commands: []
prompts:
  planning: |
{{ prompt "planning" }}
  execution: |
{{ prompt "execution" }}
  review: |
{{ prompt "review" }}
  qa: |
{{ prompt "qa" }}
  fix: |
{{ prompt "fix" }}
  archive: |
{{ prompt "archive" }}
