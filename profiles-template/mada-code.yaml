wo:
  workflow:
    engine: go-dag
    max_review_iterations: 7
    stages:
      planning:
        cli: codex
        reasoning: xhigh
        permissions: default
      execution:
        cli: codex
        reasoning: medium
        permissions: default
      fix:
        cli: codex
        reasoning: medium
        permissions: default
      review:
        cli: codex
        reasoning: high
        permissions: default
      qa:
        cli: codex
        reasoning: high
        permissions: default
      archive:
        cli: pi
        reasoning: low
        permissions: default
    parallel:
      enabled: true
      groups:
        planning_context:
          mode: advisory
          members:
            - name: 需求分析员
              purpose: 澄清代码变更目标、验收边界和风险
              stage: planning
              tool: pi
              subagent: metis
            - name: 代码库侦察员
              purpose: 搜索相关模块、测试入口和既有实现模式
              stage: planning
              tool: pi
              subagent: explore
            - name: 外部资料研究员
              purpose: 查询依赖库文档、版本约束和开源实现参考
              stage: planning
              tool: pi
              subagent: librarian
        implementation_context:
          mode: advisory
          members:
            - name: 代码路径侦察员
              purpose: 汇总 execution 需要读取的文件、调用链和测试模式
              stage: before_execution
              tool: pi
              subagent: explore
            - name: 依赖资料研究员
              purpose: 查询 execution 依赖的外部库文档和兼容性要求
              stage: before_execution
              tool: pi
              subagent: librarian
        review:
          mode: gate_input
          members:
            - name: 目标核对审核员
              purpose: 核对 proposal/spec/task 是否满足
              tool: pi
            - name: 代码质量审核员
              purpose: 检查类型、边界、错误处理和可维护性
              tool: pi
            - name: 测试有效性审核员
              purpose: 判断测试是否真实覆盖用户路径和失败模式
              tool: pi
            - name: 安全风险审核员
              purpose: 检查权限、输入、泄漏和破坏性操作
              tool: pi
            - name: 架构一致性审核员
              purpose: 检查是否符合现有模块边界和配置约定
              tool: pi
        qa:
          mode: gate_input
          members:
            - name: CLI/API 测试员
              purpose: 执行命令行或接口真实路径
              tool: pi
            - name: 回归场景测试员
              purpose: 覆盖邻近功能和历史合同回归
              tool: pi
            - name: 证据采集员
              purpose: 采集 runtime log、trace 或测试产物
              tool: pi
            - name: 边界条件测试员
              purpose: 验证错误路径、空输入和重复执行行为
              tool: pi
    validation:
      max_attempts_per_stage: 3
      commands: []
  prompts:
    planning: |
{{ prompt "planning" }}
    execution: |
{{ prompt "execution" }}
    review: |
{{ prompt "review" }}
    qa: |
{{ prompt "qa" }}
    fix: |
{{ prompt "fix" }}
    archive: |
{{ prompt "archive" }}
