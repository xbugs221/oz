wo:
  workflow:
    engine: go-dag
    max_review_iterations: 5
    stages:
      planning:
        cli: codex
        reasoning: xhigh
        permissions: default
      execution:
        cli: codex
        reasoning: high
        permissions: default
      fix:
        cli: codex
        reasoning: high
        permissions: default
      review:
        cli: codex
        reasoning: high
        permissions: default
      qa:
        cli: codex
        reasoning: high
        permissions: default
      archive:
        cli: pi
        reasoning: low
        permissions: default
    parallel:
      enabled: true
      groups:
        planning_context:
          mode: advisory
          members:
            - name: 需求澄清员
              purpose: 澄清目标、受众、成功标准和不可接受结果
              stage: planning
              tool: pi
              subagent: metis
            - name: 约束建模员
              purpose: 梳理预算、时间、技术栈、维护和组织约束
              stage: planning
              tool: pi
              subagent: explore
            - name: 候选方案研究员
              purpose: 收集可选方案、先例、成本和关键差异
              stage: planning
              tool: pi
              subagent: librarian
        implementation_context:
          mode: advisory
          members:
            - name: 候选方案研究员
              purpose: 补充 execution 所需的方案事实、文档和案例
              stage: before_execution
              tool: pi
              subagent: librarian
            - name: 约束建模员
              purpose: 将决策约束转换为可比较的取舍维度
              stage: before_execution
              tool: pi
              subagent: metis
        review:
          mode: gate_input
          members:
            - name: 反方评审员
              purpose: 主动寻找推荐方案的反例、失败条件和隐藏成本
            - name: 运维部署评审员
              purpose: 检查部署、迁移、监控、回滚和长期维护影响
            - name: 学习路线评审员
              purpose: 检查学习成本、团队吸收路径和文档可获得性
            - name: 安全合规评审员
              purpose: 检查权限、数据、许可和供应链风险
        qa:
          mode: gate_input
          members:
            - name: 证据审计员
              purpose: 核对关键结论是否有来源、日期和可复查证据
            - name: 决策矩阵测试员
              purpose: 验证候选方案比较是否覆盖硬约束和关键取舍
            - name: 反事实测试员
              purpose: 验证推荐在需求变化或约束变化下是否仍合理
    validation:
      max_attempts_per_stage: 3
      commands: []
  prompts:
    planning: |
{{ prompt "planning" }}
    execution: |
{{ prompt "execution" }}
    review: |
{{ prompt "review" }}
    qa: |
{{ prompt "qa" }}
    fix: |
{{ prompt "fix" }}
    archive: |
{{ prompt "archive" }}
